<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QueueMaster Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (UMD) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
      /* Hide scrollbar for Chrome, Safari and Opera */
      body::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      body {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
        overflow: hidden; /* Prevent scrolling on TV screens */
        background-color: #0f172a; /* Slate 900 */
        color: white;
      }
      /* Custom Animation */
      @keyframes pulse-once {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.8; }
      }
      .animate-pulse-once {
        animation: pulse-once 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- GLOBALS ---
        const { useState, useEffect, useCallback, useRef } = React;

        // --- ICONS (Inline SVG to avoid external dependencies issues) ---
        const IconBase = ({ children, className }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width="24" height="24" 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
            >
                {children}
            </svg>
        );

        const ChefHat = (props) => (
            <IconBase {...props}>
                <path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z" />
                <line x1="6" x2="18" y1="17" y2="17" />
            </IconBase>
        );

        const ShoppingBag = (props) => (
            <IconBase {...props}>
                <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" />
                <path d="M3 6h18" />
                <path d="M16 10a4 4 0 0 1-8 0" />
            </IconBase>
        );

        const Activity = (props) => (
            <IconBase {...props}>
                <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
            </IconBase>
        );

        const ClockIcon = (props) => (
            <IconBase {...props}>
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
            </IconBase>
        );

        const Trash2 = (props) => (
            <IconBase {...props}>
                <path d="M3 6h18" />
                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                <line x1="10" x2="10" y1="11" y2="17" />
                <line x1="14" x2="14" y1="11" y2="17" />
            </IconBase>
        );

        // --- CONSTANTS & TYPES ---
        const STORAGE_KEY = 'queuemaster_pro_orders';
        const SCANNER_TIMEOUT_MS = 500;
        
        const OrderStatus = {
            PREPARING: 'PREPARING',
            READY: 'READY',
            COMPLETED: 'COMPLETED'
        };

        const STATUS_CODE_MAP = {
            '1': 'PREPARING',
            '2': 'READY',
            '3': 'COMPLETED'
        };

        // --- HOOKS ---
        
        // useSound
        const useSound = () => {
            const playDing = useCallback(() => {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (!AudioContext) return;

                    const ctx = new AudioContext();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();

                    osc.connect(gain);
                    gain.connect(ctx.destination);

                    // Bell-like sound
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, ctx.currentTime); // A5
                    osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.5); // Drop to A4

                    gain.gain.setValueAtTime(0.5, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.5);

                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 1.5);
                } catch (e) {
                    console.error('Audio playback failed', e);
                }
            }, []);

            return { playDing };
        };

        // useBarcodeScanner
        const useBarcodeScanner = ({ onScan }) => {
            const [buffer, setBuffer] = useState('');
            const [lastAction, setLastAction] = useState('Waiting for input...');
            const timeoutRef = useRef(null);

            const processBuffer = useCallback((input) => {
                // 1. Full-width comma fix
                const cleanedInput = input.replace(/，/g, ',');
                
                // 2. Parse Format: Number or Number,Type or Number,Type,Status
                const parts = cleanedInput.split(',');
                const number = parts[0]?.trim();
                const type = parts[1]?.trim();
                const explicitStatus = parts[2]?.trim();

                if (number) {
                    const result = {
                        raw: cleanedInput,
                        number,
                        type: type || undefined,
                        explicitStatus: explicitStatus || undefined,
                        timestamp: Date.now()
                    };
                    
                    setLastAction(`Processed: ${number} ${type ? `(T:${type})` : ''} ${explicitStatus ? `(S:${explicitStatus})` : ''}`);
                    onScan(result);
                } else {
                    setLastAction('Invalid Input: Empty Number');
                }
                
                setBuffer('');
            }, [onScan]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    // Ignore non-character keys except Enter
                    if (e.key.length > 1 && e.key !== 'Enter') return;

                    // Clear previous timeout
                    if (timeoutRef.current) {
                        clearTimeout(timeoutRef.current);
                    }

                    if (e.key === 'Enter') {
                        // If buffer is not empty, process it
                        if (buffer.length > 0) {
                            processBuffer(buffer);
                        }
                    } else {
                        // Append to buffer
                        setBuffer((prev) => prev + e.key);
                        
                        // Set debounce timeout to clear buffer if input is too slow
                        timeoutRef.current = setTimeout(() => {
                            setBuffer('');
                        }, SCANNER_TIMEOUT_MS);
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => {
                    window.removeEventListener('keydown', handleKeyDown);
                    if (timeoutRef.current) clearTimeout(timeoutRef.current);
                };
            }, [buffer, processBuffer]);

            return { buffer, lastAction };
        };

        // --- COMPONENTS ---

        // Clock
        const Clock = () => {
            const [time, setTime] = useState(new Date());

            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            return (
                <div className="flex items-center gap-2 text-slate-300 font-mono text-xl md:text-2xl">
                    <ClockIcon className="w-6 h-6" />
                    <span>
                        {time.toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                    </span>
                </div>
            );
        };

        // OrderCard
        const OrderCard = ({ order, size }) => {
            const isReady = order.status === OrderStatus.READY;

            // Visual variants based on size and status
            const containerClasses = size === 'large'
                ? `p-6 rounded-2xl border-l-8 shadow-lg flex items-center justify-between mb-4 animate-pulse-once ${isReady ? 'bg-emerald-900/40 border-emerald-500' : 'bg-slate-800 border-slate-600'}`
                : `p-3 rounded-xl border-l-4 mb-3 flex items-center justify-between ${isReady ? 'bg-emerald-900/30 border-emerald-500' : 'bg-slate-800 border-slate-600'}`;

            const textClasses = size === 'large'
                ? 'text-7xl font-bold tracking-tighter'
                : 'text-4xl font-bold tracking-tight';

            const labelClasses = size === 'large'
                ? 'text-2xl font-medium opacity-80'
                : 'text-lg font-medium opacity-70';

            return (
                <div className={`${containerClasses} transition-all duration-300 transform`}>
                    <div className="flex flex-col">
                        <span className={`${textClasses} ${isReady ? 'text-emerald-400' : 'text-slate-200'}`}>
                            {order.number}
                        </span>
                        {order.type && (
                            <span className="text-slate-400 text-sm mt-1 font-mono bg-slate-900/50 px-2 py-0.5 rounded w-fit">
                                #{order.type}
                            </span>
                        )}
                    </div>
                    
                    <div className="flex items-center">
                        {isReady && (
                            <span className={`${labelClasses} text-emerald-400`}>
                                PICK UP
                            </span>
                        )}
                    </div>
                </div>
            );
        };

        // --- APP ---
        const App = () => {
            const [orders, setOrders] = useState(() => {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    return saved ? JSON.parse(saved) : [];
                } catch {
                    return [];
                }
            });

            const { playDing } = useSound();

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
            }, [orders]);

            const handleScan = useCallback((result) => {
                const { number, type, explicitStatus } = result;

                setOrders((prevOrders) => {
                    const existingOrderIndex = prevOrders.findIndex((o) => o.number === number);
                    const newOrders = [...prevOrders];
                    const now = Date.now();

                    // Case 1: Explicit Status
                    if (explicitStatus && STATUS_CODE_MAP[explicitStatus]) {
                        const targetStatus = STATUS_CODE_MAP[explicitStatus];
                        
                        if (targetStatus === OrderStatus.COMPLETED) {
                            return prevOrders.filter(o => o.number !== number);
                        }

                        if (existingOrderIndex >= 0) {
                            newOrders[existingOrderIndex] = {
                                ...newOrders[existingOrderIndex],
                                status: targetStatus,
                                updatedAt: now,
                                type: type || newOrders[existingOrderIndex].type
                            };
                            if (targetStatus === OrderStatus.READY) playDing();
                        } else {
                            newOrders.push({
                                id: crypto.randomUUID(),
                                number,
                                type: type,
                                status: targetStatus,
                                updatedAt: now
                            });
                            if (targetStatus === OrderStatus.READY) playDing();
                        }
                        return newOrders;
                    }

                    // Case 2: Cycle Logic
                    if (existingOrderIndex === -1) {
                        // New -> Preparing
                        newOrders.push({
                            id: crypto.randomUUID(),
                            number,
                            type: type,
                            status: OrderStatus.PREPARING,
                            updatedAt: now
                        });
                    } else {
                        const currentOrder = newOrders[existingOrderIndex];
                        
                        if (currentOrder.status === OrderStatus.PREPARING) {
                            // Preparing -> Ready
                            newOrders[existingOrderIndex] = {
                                ...currentOrder,
                                status: OrderStatus.READY,
                                updatedAt: now,
                                type: type || currentOrder.type
                            };
                            playDing();
                        } else if (currentOrder.status === OrderStatus.READY) {
                            // Ready -> Completed
                            return prevOrders.filter((_, idx) => idx !== existingOrderIndex);
                        }
                    }

                    // Sort
                    return newOrders.sort((a, b) => {
                        if (a.status === b.status) return b.updatedAt - a.updatedAt;
                        return a.status === OrderStatus.READY ? -1 : 1;
                    });
                });
            }, [playDing]);

            const handleClearAll = () => {
                if (window.confirm('Clear all orders?')) {
                    setOrders([]);
                }
            };

            const { buffer, lastAction } = useBarcodeScanner({ onScan: handleScan });

            const readyOrders = orders.filter(o => o.status === OrderStatus.READY);
            const preparingOrders = orders.filter(o => o.status === OrderStatus.PREPARING);

            return (
                <div className="h-screen w-screen bg-slate-900 flex flex-col overflow-hidden font-sans">
                    {/* Header */}
                    <header className="h-20 bg-slate-950 border-b border-slate-800 flex items-center justify-between px-8 shrink-0">
                        <div className="flex items-center gap-4">
                            <ChefHat className="w-10 h-10 text-emerald-500" />
                            <div className="flex items-center gap-6">
                                <h1 className="text-3xl font-bold text-white tracking-wide">QueueMaster <span className="text-emerald-500">Pro</span></h1>
                                <button 
                                    onClick={handleClearAll}
                                    className="flex items-center gap-2 px-3 py-1 text-[10px] font-bold text-slate-500 hover:text-red-400 border border-slate-800 hover:border-red-900/50 rounded transition-colors uppercase tracking-widest bg-slate-900/30"
                                >
                                    <Trash2 className="w-3 h-3" />
                                    Clear All
                                </button>
                            </div>
                        </div>
                        <Clock />
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 grid grid-cols-12 gap-0 overflow-hidden">
                        {/* Left: READY */}
                        <section className="col-span-7 bg-slate-900/50 p-6 flex flex-col border-r border-slate-800 h-full">
                            <div className="flex items-center gap-3 mb-6 pb-4 border-b border-slate-800">
                                <ShoppingBag className="w-8 h-8 text-emerald-400" />
                                <h2 className="text-4xl font-bold text-emerald-400 uppercase tracking-widest">
                                    Please Pick Up
                                </h2>
                            </div>
                            
                            <div className="flex-1 overflow-hidden relative">
                                <div className="absolute inset-0 overflow-y-auto pb-20 scrollbar-hide">
                                    {readyOrders.length === 0 ? (
                                        <div className="h-full flex items-center justify-center opacity-20">
                                            <span className="text-4xl font-light text-slate-500">No Orders Ready</span>
                                        </div>
                                    ) : (
                                        readyOrders.map(order => (
                                            <OrderCard key={order.id} order={order} size="large" />
                                        ))
                                    )}
                                </div>
                            </div>
                        </section>

                        {/* Right: PREPARING */}
                        <section className="col-span-5 bg-slate-950/30 p-6 flex flex-col h-full">
                            <div className="flex items-center gap-3 mb-6 pb-4 border-b border-slate-800">
                                <Activity className="w-6 h-6 text-slate-400" />
                                <h2 className="text-2xl font-bold text-slate-400 uppercase tracking-widest">
                                    Preparing
                                </h2>
                            </div>

                            <div className="flex-1 overflow-hidden relative">
                                <div className="absolute inset-0 overflow-y-auto pb-20 scrollbar-hide">
                                    {preparingOrders.length === 0 ? (
                                        <div className="h-full flex items-center justify-center opacity-20">
                                            <span className="text-2xl font-light text-slate-500">Kitchen Clear</span>
                                        </div>
                                    ) : (
                                        preparingOrders.map(order => (
                                            <OrderCard key={order.id} order={order} size="small" />
                                        ))
                                    )}
                                </div>
                            </div>
                        </section>
                    </main>

                    {/* Footer */}
                    <footer className="h-12 bg-black border-t border-slate-800 flex items-center px-4 shrink-0 font-mono text-xs md:text-sm text-slate-500 gap-4">
                        <div className="flex items-center gap-2">
                            <span className="uppercase font-bold text-slate-600">Buffer:</span>
                            <span className="text-yellow-500 bg-slate-900 px-2 py-1 rounded min-w-[50px]">{buffer}</span>
                        </div>
                        <div className="w-px h-6 bg-slate-800 mx-2"></div>
                        <div className="flex items-center gap-2 flex-1">
                            <span className="uppercase font-bold text-slate-600">Last Action:</span>
                            <span className="text-slate-300 truncate">{lastAction}</span>
                        </div>
                        <div className="text-slate-700">v1.0.0</div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
